name: Publish pyscfad-cuda-plugin

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      build_x86_64:
        description: "Build x86_64 wheels"
        type: boolean
        default: true
      build_aarch64:
        description: "Build aarch64 wheels"
        type: boolean
        default: true

jobs:
  build_wheel_linux:
    # aarch64 builds on native ARM runners (nvcc runs natively, no QEMU);
    # x86_64 on standard runners.
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        py: ['3.11', '3.12', '3.13', '3.14']
        # Each CUDA major builds a separate wheel (pyscfad-cuda<major>-plugin)
        # linked against, and declaring a runtime dependency on, the matching
        # nvidia-*-cu<major> packages. `pkg` is the NVIDIA yum package suffix
        # and `home` the toolkit install location find_package(CUDAToolkit) uses.
        cuda:
          # CUDA 12.8+ is required for the default sm_100/sm_120 (Blackwell) PTX.
          - major: '12'
            pkg: '12-9'
            home: /usr/local/cuda-12.9
          - major: '13'
            pkg: '13-0'
            home: /usr/local/cuda-13.0

    steps:
      - uses: actions/checkout@v5

      - name: Decide whether to build
        id: decide
        shell: bash
        run: |
          should_build=false

          if [ "${{ github.event_name }}" = "release" ]; then
            # On release: always build all matrix combinations
            should_build=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ matrix.arch }}" = "x86_64" ] && [ "${{ inputs.build_x86_64 }}" = "true" ]; then
              should_build=true
            elif [ "${{ matrix.arch }}" = "aarch64" ] && [ "${{ inputs.build_aarch64 }}" = "true" ]; then
              should_build=true
            fi
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.arch }} cuda${{ matrix.cuda.major }} wheel for Python ${{ matrix.py }}
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        run: |
          ARCH=${{ matrix.arch }}
          PY=${{ matrix.py }}
          TAG=${PY/./}
          CUDA_MAJOR=${{ matrix.cuda.major }}
          CUDA_PKG=${{ matrix.cuda.pkg }}
          CUDA_HOME_DIR=${{ matrix.cuda.home }}

          if [ "$ARCH" = "x86_64" ]; then
            IMAGE=quay.io/pypa/manylinux_2_28_x86_64
            CUDA_REPO_ARCH=x86_64
          else
            IMAGE=quay.io/pypa/manylinux_2_28_aarch64
            CUDA_REPO_ARCH=sbsa
          fi

          # Pass explicit values (not the value-less `-e VAR` form, which only
          # forwards exported variables) so the inner `set -u` script sees them.
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            -e TAG="$TAG" \
            -e CUDA_MAJOR="$CUDA_MAJOR" \
            -e CUDA_PKG="$CUDA_PKG" \
            -e CUDA_HOME_DIR="$CUDA_HOME_DIR" \
            -e CUDA_REPO_ARCH="$CUDA_REPO_ARCH" \
            "$IMAGE" \
            bash -lc '
              set -euo pipefail

              # CUDA toolkit (nvcc + cudart/cusolver/cublas devel) from NVIDIA.
              # Bazel previously fetched these via XLA hermetic CUDA; without
              # Bazel we install the matching toolkit and let CMake find it.
              yum install -y curl git
              curl -Lo /etc/yum.repos.d/cuda.repo \
                https://developer.download.nvidia.com/compute/cuda/repos/rhel8/${CUDA_REPO_ARCH}/cuda-rhel8.repo
              rpm --import https://developer.download.nvidia.com/compute/cuda/repos/rhel8/${CUDA_REPO_ARCH}/D42D0685.pub
              yum clean all
              yum install -y gcc-toolset-12-gcc gcc-toolset-12-gcc-c++ \
                             cuda-nvcc-${CUDA_PKG} cuda-cudart-devel-${CUDA_PKG} \
                             libcusolver-devel-${CUDA_PKG} libcublas-devel-${CUDA_PKG}

              export PATH=/opt/rh/gcc-toolset-12/root/usr/bin:${CUDA_HOME_DIR}/bin:$PATH
              export CUDA_HOME=${CUDA_HOME_DIR}
              export CUDAToolkit_ROOT=${CUDA_HOME_DIR}

              PYBIN=/opt/python/cp${TAG}-cp${TAG}/bin
              "$PYBIN/pip" install --no-cache-dir --upgrade pip build auditwheel \
                                   cmake ninja nanobind jax numpy
              ln -sf "$PYBIN/python3" /usr/local/bin/python3

              cd /project/pyscfadlib
              python3 plugins/cuda/build_plugin.py --cuda-major "${CUDA_MAJOR}" --output-path dist

              # Slim wheel: do not bundle the CUDA libraries; they are resolved at
              # runtime from the nvidia-*-cu<major> dependencies. This mirrors the
              # former Bazel --config=cuda_libraries_from_stubs behaviour.
              mkdir -p wheelhouse
              "$PYBIN/python" -m auditwheel repair dist/*.whl -w wheelhouse/ \
                --exclude "libcusolver.so.*" \
                --exclude "libcublas.so.*" \
                --exclude "libcublasLt.so.*" \
                --exclude "libcudart.so.*" \
                --exclude "libcusparse.so.*" \
                --exclude "libnvJitLink.so.*"
            '

      - name: Upload wheel
        if: ${{ steps.decide.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cuda_plugin_${{ matrix.cuda.major }}_${{ matrix.arch }}_${{ matrix.py }}
          path: pyscfadlib/wheelhouse/*.whl
          overwrite: true

  publish_pypi_linux:
    needs: build_wheel_linux
    if: always()
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -R dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
