name: Claude Issue Triage
description: Run Claude Code for issue triage in GitHub Actions
on:
  issues:
    types: [opened]

# Triage ONLY applies labels. It does NOT trigger any fix: bug fixes and feature
# implementations are started manually by a trusted maintainer mentioning @claude
# on the issue (see claude.yml), which runs the verification gate + multi-agent
# pipeline. There is no label-triggered auto-fix.
jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The agent reads UNTRUSTED issue content, so this job gets NO actions: write
    # (it must not be able to dispatch workflows even if prompt-injected).
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code for Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          # NOTE: /label-issue requires .claude/commands/label-issue.md and scripts/edit-issue-labels.sh in your repo (see this repo for examples)
          prompt: "/label-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }}"

          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-8 --effort medium'
          allowed_non_write_users: "*" # Required for issue triage workflow, if users without repo write access create issues
          github_token: ${{ secrets.GITHUB_TOKEN }}
