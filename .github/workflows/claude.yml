name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

concurrency:
  # Bound the Claude<->reviewer loop WITHOUT letting unrelated events cancel a
  # normal @claude run:
  #   - Auto-review path: only reviews that the job-level `if` would actually
  #     ACCEPT for the auto path share one per-PR group ('claude-autoreview-<pr>'),
  #     so a newer eligible review supersedes an in-flight auto-run (the loop
  #     bound). The eligibility test is duplicated here because concurrency is
  #     evaluated BEFORE the job `if`: an ineligible review (approved/dismissed,
  #     untrusted reviewer, non-Claude PR, or @claude-mention) must NOT land in
  #     the shared group, or it would cancel a legitimate in-flight auto-fix run
  #     and then skip its own job. Keep these checks in sync with the job `if`.
  #   - Everything else (mention runs + skipped/ineligible review events): a
  #     unique group ('claude-solo-<id>') keyed by the triggering event id, so it
  #     runs to completion and never cancels anything.
  # cancel-in-progress therefore only ever affects the shared auto-review group.
  group: "${{ (github.event_name == 'pull_request_review' && !contains(github.event.review.body, '@claude') && github.actor != 'claude[bot]' && github.event.pull_request.user.login == 'claude[bot]' && github.event.review.state != 'approved' && github.event.review.state != 'dismissed' && (github.event.review.user.login == 'chatgpt-codex-connector[bot]' || github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'COLLABORATOR')) && format('claude-autoreview-{0}', github.event.pull_request.number) || format('claude-solo-{0}', github.event.comment.id || github.event.review.id || github.event.issue.id || github.run_id) }}"
  cancel-in-progress: true

jobs:
  claude:
    # Two ways to invoke Claude:
    #   1. @claude mention path — any of the four events, but only from a
    #      trusted author (OWNER / MEMBER / COLLABORATOR).
    #   2. Auto-address-review path — a submitted PR review (no @claude needed)
    #      from either the Codex review bot or a trusted human reviewer, but ONLY
    #      on PRs that Claude itself opened (pull_request.user is claude[bot]).
    #      This is what lets Claude automatically respond to reviews, push fixes,
    #      and resolve threads on its own PRs. Approved/dismissed reviews are
    #      skipped (nothing to do).
    # `github.actor != 'claude[bot]'` guards against Claude triggering itself.
    if: |
      github.actor != 'claude[bot]' && (
        (
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'),
                   github.event.comment.author_association || github.event.review.author_association || github.event.issue.author_association)
          && (
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
          )
        ) || (
          github.event_name == 'pull_request_review'
          && github.event.pull_request.user.login == 'claude[bot]'
          && github.event.review.state != 'approved'
          && github.event.review.state != 'dismissed'
          && (
            github.event.review.user.login == 'chatgpt-codex-connector[bot]'
            || contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create branches and push commits
      pull-requests: write   # open the PR
      issues: write          # comment back on the issue
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # The action skips bot-triggered runs by default. The auto-address-review
          # path is triggered BY the Codex review bot, so allow that bot explicitly
          # (scoped, not '*') — otherwise the run is silently skipped. Human @claude
          # triggers are unaffected.
          allowed_bots: 'chatgpt-codex-connector[bot]'

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # The Bash tool runs inside an OS-level sandbox by default, which
          # routes network through a proxy with a domain allowlist. `git push`
          # (and `pip install`) need the network, and in a headless CI run the
          # sandbox cannot prompt a human to escalate out — so they get denied.
          # Matching is per-host, so list every host the workflow touches:
          #   github.com           - git push/fetch over HTTPS
          #   api.github.com       - the `gh` CLI (gh pr create / comment / view)
          #   pypi.org, files.pythonhosted.org - `pip install`
          settings: |
            {
              "sandbox": {
                "enabled": true,
                "network": {
                  "allowedDomains": ["github.com", "api.github.com", "pypi.org", "files.pythonhosted.org", "arxiv.org", "docs.python.org", "readthedocs.io", "pyscf.org", "github.io", "wikipedia.org", "doi.org", "raw.githubusercontent.com", "stackoverflow.com", "stackexchange.com", "chemrxiv.org", "semanticscholar.org"]
                }
              },
              "permissions": {
                "allow": ["WebSearch", "WebFetch(domain:github.com)", "WebFetch(domain:api.github.com)", "WebFetch(domain:raw.githubusercontent.com)", "WebFetch(domain:arxiv.org)", "WebFetch(domain:docs.python.org)", "WebFetch(domain:readthedocs.io)", "WebFetch(domain:pyscf.org)", "WebFetch(domain:github.io)", "WebFetch(domain:wikipedia.org)", "WebFetch(domain:doi.org)", "WebFetch(domain:stackoverflow.com)", "WebFetch(domain:stackexchange.com)", "WebFetch(domain:chemrxiv.org)", "WebFetch(domain:semanticscholar.org)"]
              }
            }

          # PROMPT / MODE SELECTION.
          # claude-code-action auto-detects "tag" vs "agent" mode:
          #   - tag mode (empty prompt + @claude mention): posts/updates a tracking
          #     comment and auto-fetches issue/PR context. This is the @claude path.
          #   - agent mode (non-empty prompt): runs headlessly; the prepare step
          #     proceeds only when `prompt` is non-empty.
          # A pull_request_review submitted WITHOUT an @claude mention matches
          # neither the tag trigger (no mention) nor the agent trigger (empty
          # prompt): the detector falls through to agent mode and the prepare step
          # then SKIPS the run because the prompt is empty (verified in the action
          # source: detector.ts returns "agent" by default, prepare.ts gates agent
          # mode on a non-empty prompt). So set a prompt ONLY for that no-mention
          # auto-review case — it selects agent mode, lets the run proceed, and
          # carries the PR number + task. Every other trigger yields '' -> tag mode,
          # unchanged. The detailed thread-handling procedure stays in
          # `--append-system-prompt` below and applies in both modes.
          prompt: "${{ (github.event_name == 'pull_request_review' && !contains(github.event.review.body, '@claude')) && format('A pull request review was submitted on PR #{0} of {1} without an @claude mention. First check out the PR branch with `gh pr checkout {0}` (this run starts on the base branch). The reviewer''s top-level review body was: <<<{2}>>>. Treat that body as feedback to address as well, in addition to any inline review threads (the body is NOT a review thread and will not appear when you enumerate threads). Then follow the review-handling procedure in your system prompt: enumerate the PR''s unresolved review threads with `gh api graphql`, fix the valid findings (and the points raised in the review body), run the relevant tests when you touch code, commit and push to the PR branch, reply to each inline thread you handled, resolve ONLY the threads you actually fixed, and post one summary comment of what you fixed and what you left open (replying to the review body there if it had no inline threads).', github.event.pull_request.number, github.repository, github.event.review.body) || '' }}"

          #
          # Allowed tools let Claude edit files, run the build/test suite, commit,
          # push, and open PRs, and — for @claude requests on an issue — spawn
          # subagents via `Task` for the multi-agent issue-resolution pipeline in
          # .claude/commands/fix-issue.md (bug-verifier gate -> context-builder ->
          # fix-planner -> fix-implementer/fix-verifier loop), using the subagents
          # in .claude/agents/. Bash is deny-by-default, so only the listed commands
          # are permitted (this list adds to the built-in Edit/Write). The job-level
          # `if:` is what gates who can invoke Claude (trusted @claude mentions, plus
          # auto-runs on Codex / trusted-human reviews); the system prompt only
          # shapes WHAT it does. A trusted maintainer mentioning @claude on an issue
          # is the ONLY way fixes/features are implemented — there is no
          # label-triggered auto-fix.
          claude_args: |
            --model claude-opus-4-8
            --effort max
            --allowed-tools "Task,Read,Grep,Glob,Bash(git:*),Bash(gh:*),Bash(./scripts/gh.sh:*),Bash(python:*),Bash(pytest:*),Bash(pip:*),Edit,Write,WebSearch,WebFetch(domain:github.com),WebFetch(domain:api.github.com),WebFetch(domain:raw.githubusercontent.com),WebFetch(domain:arxiv.org),WebFetch(domain:docs.python.org),WebFetch(domain:readthedocs.io),WebFetch(domain:pyscf.org),WebFetch(domain:github.io),WebFetch(domain:wikipedia.org),WebFetch(domain:doi.org),WebFetch(domain:stackoverflow.com),WebFetch(domain:stackexchange.com),WebFetch(domain:chemrxiv.org),WebFetch(domain:semanticscholar.org)"
            --append-system-prompt "When you are triggered on an existing open pull request (via a PR review, a review comment, or an issue comment on the PR), address the feedback directly: make the code changes, run the relevant tests when code is touched, commit to that PR's branch and push, then post a comment summarizing what you changed and how you verified it. When you are triggered on an ISSUE asking to fix a bug or implement a feature, run the multi-agent pipeline in .claude/commands/fix-issue.md: FIRST dispatch the bug-verifier subagent to confirm the bug actually reproduces (or that a feature request is actionable), and ONLY if its verdict is 'confirmed' (bug) or 'actionable' (feature) do you proceed — otherwise post a single comment with the verdict and its evidence and STOP without changing code. When the gate passes, your VERY FIRST action — before the context-builder, the fix-planner, or any code — is to create the draft PR so it exists no matter when the run ends. This OVERRIDES the built-in guidance that says to push only at the end and to merely provide a 'Create a PR' link. Do it now: (1) you are ALREADY on the branch this action created for you, so do NOT create a new branch — read its name with `git rev-parse --abbrev-ref HEAD`; (2) make an initial empty commit: `git commit --allow-empty -m 'WIP: start fix for #N'`; (3) push the current branch, preferring the action push helper `git-push.sh` and otherwise `git push -u origin HEAD`; (4) actually OPEN the PR now with `gh pr create --draft` (body begins with 'Fixes #N' and is marked WIP) — do NOT just post a Create-a-PR link; record its number. THEN dispatch the context-builder and the fix-planner, and update the PR body with the plan via `gh pr edit`. Then orchestrate fix-implementer/fix-verifier subagents in a loop (up to 4 iterations) until the targeted tests converge; spawn all of these with the Task tool (they are defined in .claude/agents/). Commit and push (via `git-push.sh`) after EVERY iteration so the remote always reflects the latest work even if the run ends early. When the loop ends, update that same PR with `gh pr edit` (add the exact verification commands and results), then comment on the issue linking the PR. Do not green-wash: if the tests do not converge within the iteration cap, leave the existing draft PR clearly marked NEEDS WORK with the failing output rather than a passing-looking one. If the issue is only a question or not an actionable code change, respond with your findings as a comment instead of opening a PR. IMPORTANT: GitHub forbids your token from creating or updating files under .github/workflows/ (the 'workflows permission' restriction), so any git push that touches a workflow file will be rejected. If a change requires editing .github/workflows/, do NOT attempt to commit or push it — instead post the full change as a diff/patch in a comment and ask a human to apply it manually. When you are triggered by a submitted pull request review (including automated reviewers such as Codex), treat every UNRESOLVED review thread as a task. First enumerate the PR's review threads with `gh api graphql`, querying repository.pullRequest.reviewThreads and reading each node's id (the thread node id), isResolved, isOutdated, path, line, and its comments' databaseId, author login and body; skip any thread whose isResolved is already true. For each unresolved thread, judge the finding on its merits: if it is valid, implement the fix in the code. After addressing the findings, run the relevant tests when code is touched, then commit to the PR branch and push. Then, for each thread you handled, reply to it by POSTing to the REST endpoint repos/{owner}/{repo}/pulls/{number}/comments/{comment_databaseId}/replies (using the databaseId of the thread's first comment) explaining what you changed or why you did not change anything. ONLY resolve a thread whose finding you actually fixed, by calling the GraphQL resolveReviewThread mutation with that thread's node id. Do NOT resolve a thread you disagreed with or could not fix — leave it open with a reply explaining your reasoning. Finally, post one summary comment listing which findings you fixed and resolved, and which you left open and why."

